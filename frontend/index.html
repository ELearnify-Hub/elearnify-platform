<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>ELearnify</title>

    <!--
      CRITICAL: Apply theme BEFORE React loads
      This prevents the "flash of wrong theme" (FOWT)
      The script runs synchronously, blocking render until theme is set
    -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('elearnify-theme') || 'light';

          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(theme);

          if (theme === 'dark') {
            document
              .querySelector('meta[name="theme-color"]')
              ?.setAttribute('content', '#0f172a');
          } else {
            document
              .querySelector('meta[name="theme-color"]')
              ?.setAttribute('content', '#ffffff');
          }
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
